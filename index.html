<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brisbane Theatre Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif;
}

html,body{
  height:100%;
}

#map{
  height:100vh;
  width:100%;
}

#searchBar{
  position:fixed;
  top:15px;
  left:15px;
  right:15px;
  z-index:1000;
}

#searchInput{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  font-size:16px;
}

#fab{
  position:fixed;
  right:20px;
  bottom:180px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:#10b981;
  color:white;
  font-size:32px;
  cursor:pointer;
  z-index:1000;
  box-shadow:0 5px 15px rgba(0,0,0,.25);
}

#drawer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:35vh;
  background:white;
  z-index:999;
  border-radius:20px 20px 0 0;
  overflow:auto;
  box-shadow:0 -5px 20px rgba(0,0,0,.2);
}

.handle{
  width:60px;
  height:6px;
  background:#ccc;
  margin:10px auto;
  border-radius:999px;
}

.drawer-header{
  padding:0 20px 15px;
  font-weight:bold;
  font-size:20px;
}

.theatre-card{
  margin:12px;
  padding:15px;
  border-radius:12px;
  background:#f4f4f4;
}

.theatre-card h3{
  margin-bottom:8px;
}

.theatre-card p{
  margin-bottom:6px;
  color:#555;
}

.card-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.card-actions button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.edit-btn{
  background:#3b82f6;
  color:white;
}

.delete-btn{
  background:#ef4444;
  color:white;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.hidden{
  display:none;
}

.modal-content{
  background:white;
  width:90%;
  max-width:400px;
  padding:20px;
  border-radius:16px;
}

.modal-content h2{
  margin-bottom:15px;
}

.modal-content input,
.modal-content textarea{
  width:100%;
  margin-top:6px;
  margin-bottom:14px;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
}

.modal-buttons{
  display:flex;
  gap:10px;
}

.modal-buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.save-btn{
  background:#10b981;
  color:white;
}

.cancel-btn{
  background:#999;
  color:white;
}

@media(min-width:768px){

  #drawer{
    width:400px;
    right:auto;
    top:0;
    height:100vh;
    border-radius:0;
  }

  #fab{
    bottom:30px;
    left:430px;
    right:auto;
  }

  #searchBar{
    left:430px;
    width:350px;
    right:auto;
  }
}
</style>
</head>
<body>

<div id="searchBar">
  <input
    id="searchInput"
    placeholder="Search theatres..."
  >
</div>

<div id="map"></div>

<button id="fab">+</button>

<div id="drawer">
  <div class="handle"></div>
  <div class="drawer-header">
    Brisbane Theatres
  </div>

  <div id="theatreList"></div>
</div>

<div class="modal hidden" id="modal">
  <div class="modal-content">

    <h2 id="modalTitle">
      Add Theatre
    </h2>

    <form id="theatreForm">

      <input type="hidden" id="theatreId">

      <label>Name</label>
      <input id="name" required>

      <label>Address</label>
      <input id="address" required>

      <label>Description</label>
      <textarea id="description"></textarea>

      <input type="hidden" id="lat">
      <input type="hidden" id="lng">

      <div class="modal-buttons">

        <button class="save-btn">
          Save
        </button>

        <button
          type="button"
          id="cancelBtn"
          class="cancel-btn"
        >
          Cancel
        </button>

      </div>

    </form>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map')
.setView([-27.4698,153.0251],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'© OpenStreetMap'
}
).addTo(map);

let markers=[];

let selectedLat=null;
let selectedLng=null;

let theatres =
JSON.parse(
localStorage.getItem('brisbane_theatres')
) || [
{
id:1,
name:'QPAC',
address:'South Brisbane',
description:'Queensland Performing Arts Centre',
lat:-27.4748,
lng:153.0170
},
{
id:2,
name:'Twelfth Night Theatre',
address:'Bowen Hills',
description:'Community Theatre',
lat:-27.4456,
lng:153.0367
}
];

const modal =
document.getElementById('modal');

const theatreList =
document.getElementById('theatreList');

function saveData(){
 localStorage.setItem(
  'brisbane_theatres',
  JSON.stringify(theatres)
 );
}

function clearMarkers(){
 markers.forEach(m=>map.removeLayer(m));
 markers=[];
}

function render(){

 clearMarkers();

 theatreList.innerHTML='';

 theatres.forEach(theatre=>{

  const marker =
  L.marker([
    theatre.lat,
    theatre.lng
  ]).addTo(map);

  marker.bindPopup(`
    <b>${theatre.name}</b><br>
    ${theatre.address}<br>
    ${theatre.description}
  `);

  markers.push(marker);

  const card =
  document.createElement('div');

  card.className='theatre-card';

  card.innerHTML=`
    <h3>${theatre.name}</h3>
    <p>${theatre.address}</p>
    <p>${theatre.description}</p>

    <div class="card-actions">
      <button
        class="edit-btn"
      >
        Edit
      </button>

      <button
        class="delete-btn"
      >
        Delete
      </button>
    </div>
  `;

  card.onclick=(e)=>{

    if(
      e.target.classList.contains('edit-btn') ||
      e.target.classList.contains('delete-btn')
    ){
      return;
    }

    map.setView(
      [theatre.lat,theatre.lng],
      16
    );

    marker.openPopup();
  };

  card
  .querySelector('.edit-btn')
  .onclick=()=>editTheatre(theatre);

  card
  .querySelector('.delete-btn')
  .onclick=()=>deleteTheatre(theatre.id);

  theatreList.appendChild(card);

 });
}

function openModal(){
 modal.classList.remove('hidden');
}

function closeModal(){
 modal.classList.add('hidden');
}

document
.getElementById('cancelBtn')
.onclick=closeModal;

document
.getElementById('fab')
.onclick=()=>{

 alert(
 'Tap anywhere on the map to choose the theatre location.'
 );

};

map.on('click',(e)=>{

 selectedLat=e.latlng.lat;
 selectedLng=e.latlng.lng;

 document
 .getElementById('lat')
 .value=selectedLat;

 document
 .getElementById('lng')
 .value=selectedLng;

 document
 .getElementById('theatreForm')
 .reset();

 document
 .getElementById('theatreId')
 .value='';

 document
 .getElementById('modalTitle')
 .textContent='Add Theatre';

 openModal();

});

document
.getElementById('theatreForm')
.addEventListener(
'submit',
function(e){

 e.preventDefault();

 const id=
 document
 .getElementById('theatreId')
 .value;

 const theatre={
  id:id ? Number(id) : Date.now(),
  name:
  document
  .getElementById('name')
  .value,

  address:
  document
  .getElementById('address')
  .value,

  description:
  document
  .getElementById('description')
  .value,

  lat:Number(
   document
   .getElementById('lat')
   .value
  ),

  lng:Number(
   document
   .getElementById('lng')
   .value
  )
 };

 if(id){

  theatres=
  theatres.map(t=>
   t.id===Number(id)
   ? theatre
   : t
  );

 }else{

  theatres.push(theatre);

 }

 saveData();
 render();
 closeModal();

});

function editTheatre(theatre){

 document
 .getElementById('modalTitle')
 .textContent='Edit Theatre';

 document
 .getElementById('theatreId')
 .value=theatre.id;

 document
 .getElementById('name')
 .value=theatre.name;

 document
 .getElementById('address')
 .value=theatre.address;

 document
 .getElementById('description')
 .value=theatre.description;

 document
 .getElementById('lat')
 .value=theatre.lat;

 document
 .getElementById('lng')
 .value=theatre.lng;

 openModal();
}

function deleteTheatre(id){

 if(!confirm('Delete theatre?')){
  return;
 }

 theatres=
 theatres.filter(
  t=>t.id!==id
 );

 saveData();
 render();
}

document
.getElementById('searchInput')
.addEventListener(
'input',
function(){

 const term=
 this.value.toLowerCase();

 document
 .querySelectorAll('.theatre-card')
 .forEach(card=>{

   card.style.display=
   card.innerText
   .toLowerCase()
   .includes(term)
   ? 'block'
   : 'none';

 });

});

render();
</script>

</body>
</html>
